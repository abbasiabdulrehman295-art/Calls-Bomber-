<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>😈 RAJPUT Bomber Terminal</title>
    <style>
        /* Hacker/Terminal Aesthetic CSS */
        body { 
            font-family: 'Courier New', Courier, monospace; /* Monospaced font for terminal feel */
            background-color: #0a0a0a; /* Near black background */
            color: #39ff14; /* Bright green "green screen" text color */
            padding: 20px;
        }
        .container { 
            max-width: 900px; 
            margin: 0 auto; 
            background: rgba(0, 50, 0, 0.7); /* Dark green/black semi-transparent box */
            padding: 30px; 
            border: 2px dashed #39ff14; /* Green dashed border effect */
            box-shadow: 0 0 15px #39ff14; /* Glow effect */
        }
        h1 { color: #ff6b6b; text-align: center; margin-bottom: 25px; } /* Reddish title for urgency */
        label { display: block; margin-top: 18px; font-weight: bold; color: #39ff14; }
        textarea, input[type="number"] { 
            width: 100%; 
            padding: 10px; 
            margin-top: 5px; 
            border: 1px solid #39ff14; /* Green border */
            box-sizing: border-box; 
            font-size: 16px; 
            background-color: rgba(0, 10, 0, 0.8); /* Dark input background */
            color: #39ff14;
        }
        button { 
            background-color: #ff6b6b; /* Red button for action */
            color: black; 
            padding: 12px 25px; 
            border: none; 
            border-radius: 5px; 
            cursor: pointer; 
            margin-top: 30px; 
            font-size: 18px; 
            width: 100%; 
            transition: background-color 0.3s, box-shadow 0.3s;
        }
        button:hover { 
            background-color: #ff8a6b; /* Lighter red on hover */
            box-shadow: 0 0 10px #ff8a6b;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>😈 RAJPUT Bomber Terminal v2.0</h1>
        <p style="text-align: center; color: #fff354;">[INIT] System ready for connection bombardment...</p>

        <!-- Form submits data to process_bomber.php -->
        <form action="/api/process_bomber.php" method="POST">

            <div class="input-group">
                <label for="numbers">📞 TARGET INPUT (Pakistan Format Recommended):</label>
                <textarea id="numbers" name="numbers" rows="1" placeholder="Enter numbers separated by commas, e.g., +923000000000</textarea>
            </div>

            <div class="input-group">
                <label for="max_calls">LIMIT SET (Max Calls Per Batch):</label>
                <input type="number" id="max_calls" name="max_calls" value="30" min="1" required>
            </div>

            <div class="input-group">
                <label for="delay_time">DELAY SET (Seconds between calls):</label>
                <input type="number" step="0.5" id="delay_time" name="delay_time" value="5.0" min="0.5" required>
            </div>

            <button type="submit">▶️ INITIATE BOMBARDMENT SEQUENCE</button>
        </form>
    </div>
</body>
</html>
